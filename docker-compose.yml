version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CIVIC_ENV=${CIVIC_ENV:-production}
      - CIVIC_PORT=8000
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/civic.db}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Postgres for production
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civic}
      POSTGRES_DB: civic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles: ["postgres"]

volumes:
  postgres_data:
